version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./thidaai.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - APP_SECRET_KEY=change-this-in-production
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
